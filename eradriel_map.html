<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eradriel — Mappa</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#d4a830;--gold-dk:#8B6914;--gold-dim:#5a4010;
  --ink:#0e0902;--border:#5a4010;
  --text:#c9b47a;--text-dim:#7a6030;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;background:var(--ink);overflow:hidden;font-family:'IM Fell English',serif;color:var(--text);}

/* ── VIEWPORT ── */
#vp{
  position:fixed;inset:0;
  /* pointer-events and touch-action managed via JS */
  touch-action:none;
  cursor:grab;
}
#vp.panning{cursor:grabbing;}
#vp.crosshair{cursor:crosshair;}

/* ── STAGE (transformed) ── */
#stage{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;}
svg{display:block;width:900px;height:900px;overflow:visible;}

/* ── TOP BAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:400;
  background:rgba(8,5,1,.97);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;padding:0 10px;
  overflow-x:auto;scrollbar-width:none;
}
#topbar::-webkit-scrollbar{display:none;}
.tb-ttl{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--gold);letter-spacing:2px;white-space:nowrap;margin-right:4px;flex-shrink:0;}
.sep{width:1px;height:26px;background:var(--border);flex-shrink:0;margin:0 2px;}
.tb{
  height:34px;min-width:34px;padding:0 10px;border-radius:6px;
  border:1px solid var(--border);background:rgba(18,10,2,.8);
  color:var(--text);font-family:'Cinzel',serif;font-size:10px;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:4px;letter-spacing:.5px;
  transition:background .1s,border-color .1s,color .1s;
}
.tb:active,.tb.on{background:rgba(70,40,4,.9);border-color:var(--gold);color:var(--gold);}
.tb.red{border-color:#5a1810;}
.tb.red:active{background:rgba(70,8,4,.9);border-color:#c02818;color:#e06050;}

/* ── ZOOM BUTTONS ── */
#zoom{position:fixed;right:12px;bottom:90px;z-index:90;display:flex;flex-direction:column;gap:6px;}
.zb{
  width:46px;height:46px;background:rgba(8,5,1,.95);border:1px solid var(--border);
  border-radius:10px;color:var(--gold);font-size:24px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.zb:active{background:rgba(50,28,4,.95);border-color:var(--gold);}

/* ── COMPASS ── */
#compass{position:fixed;top:62px;right:12px;z-index:90;opacity:.9;pointer-events:none;}
#compass svg{width:52px;height:52px;}

/* ── LEGEND ── */
#legend{
  position:fixed;bottom:12px;left:12px;z-index:90;
  background:rgba(6,4,1,.96);border:1px solid var(--gold-dim);
  border-radius:10px;font-size:11px;
  max-width:calc(100vw - 80px);
  transition:all .2s ease;
  overflow:hidden;
  cursor:pointer;
  user-select:none;
}
#leg-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;gap:8px;
}
#leg-header h3{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin:0;}
#leg-toggle{font-size:14px;color:var(--gold-dim);line-height:1;transition:transform .2s;}
#leg-body{padding:0 12px 10px;display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;}
#legend.collapsed #leg-body{display:none;}
#legend.collapsed #leg-toggle{transform:rotate(180deg);}
.li{display:flex;align-items:center;gap:6px;line-height:2;white-space:nowrap;}
.li-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}

/* ── BOTTOM SHEET (shared) ── */
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:rgba(8,5,1,.99);border-top:2px solid var(--gold-dk);
  border-radius:18px 18px 0 0;
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  max-height:78vh;overflow-y:auto;overscroll-behavior:contain;
}
.sheet.open{transform:translateY(0);}
.sh-bar{width:38px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;opacity:.7;}
.sh-head{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 4px;}
.sh-title{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);letter-spacing:1px;}
.sh-x{background:none;border:none;color:var(--text-dim);font-size:24px;cursor:pointer;padding:4px 8px;line-height:1;}
.sh-body{padding:6px 18px 16px;}

/* form elements */
.fl{margin-bottom:12px;}
.fl label{display:block;font-family:'Cinzel',serif;font-size:9px;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}
.fi{width:100%;background:rgba(16,10,2,.8);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IM Fell English',serif;font-size:15px;padding:8px 10px;outline:none;}
.fi:focus{border-color:var(--gold-dk);}
.fs{width:100%;background:rgba(16,10,2,.8);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IM Fell English',serif;font-size:14px;padding:8px 8px;outline:none;}
.fc{width:100%;height:40px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;padding:2px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.row-btns{display:flex;gap:8px;margin-top:14px;}
.btn-save{flex:1;height:42px;background:rgba(70,44,4,.85);border:1px solid var(--gold-dk);border-radius:8px;color:var(--gold);font-family:'Cinzel',serif;font-size:11px;cursor:pointer;}
.btn-save:active{background:rgba(100,62,6,.95);}
.btn-del{height:42px;padding:0 16px;background:rgba(50,8,4,.85);border:1px solid #6a1a10;border-radius:8px;color:#e06050;font-family:'Cinzel',serif;font-size:11px;cursor:pointer;}
.btn-del:active{background:rgba(80,12,6,.95);}
.confirm-box{display:none;background:rgba(40,6,2,.96);border:1px solid #8a1a10;border-radius:8px;padding:14px;margin-top:12px;text-align:center;}
.confirm-box.show{display:block;}
.confirm-box p{font-size:13px;color:#e8b0a0;margin-bottom:12px;}
.confirm-box .row-btns{margin-top:0;}
.btn-yes{flex:1;height:38px;background:rgba(80,12,6,.9);border:1px solid #c02818;border-radius:7px;color:#e06050;font-family:'Cinzel',serif;font-size:10px;cursor:pointer;}
.btn-no{flex:1;height:38px;background:rgba(16,10,2,.8);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Cinzel',serif;font-size:10px;cursor:pointer;}
.hint{font-size:11px;color:var(--text-dim);margin-bottom:10px;line-height:1.5;}

/* info panel */
#ip-region{font-style:italic;font-size:11px;color:var(--text-dim);text-align:center;margin-bottom:4px;}
#ip-name{font-family:'Cinzel',serif;font-size:22px;color:var(--gold);text-align:center;margin-bottom:10px;}
.ip-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dk),transparent);margin:0 auto 10px;}
#ip-pop{font-size:16px;color:#e8d5a0;text-align:center;opacity:.9;}
#ip-type{font-style:italic;font-size:12px;color:var(--text-dim);text-align:center;margin-top:5px;}

/* vertex handles */
.vh{
  fill:#d4a830;stroke:#0e0902;stroke-width:2;
  cursor:move;touch-action:none;
}
.vh:hover,.vh.drag{fill:#fff;}
.vhr{fill:none;stroke:#d4a830;stroke-width:1;opacity:.3;pointer-events:none;}

/* mode indicator */
#mode-badge{
  position:fixed;bottom:16px;right:12px;z-index:90;
  background:rgba(8,5,1,.94);border:1px solid var(--border);
  border-radius:20px;padding:6px 12px;
  font-family:'Cinzel',serif;font-size:9px;color:var(--text-dim);
  letter-spacing:.5px;pointer-events:none;
}

/* toast */
#toast{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(10px);
  background:rgba(50,30,4,.96);border:1px solid var(--gold-dk);border-radius:6px;
  color:var(--gold);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;
  padding:8px 18px;z-index:550;opacity:0;transition:opacity .18s,transform .18s;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* overlay for reset confirm */
#overlay{
  display:none;position:fixed;inset:0;z-index:600;
  background:rgba(4,2,0,.75);align-items:center;justify-content:center;padding:20px;
}
#overlay.show{display:flex;}
.ov-box{
  background:rgba(10,6,1,.99);border:1px solid #8a1a10;
  border-radius:12px;padding:24px 20px;max-width:320px;width:100%;text-align:center;
}
.ov-box h3{font-family:'Cinzel',serif;font-size:15px;color:var(--gold);margin-bottom:10px;}
.ov-box p{font-size:13px;color:var(--text);margin-bottom:20px;line-height:1.5;}

/* ── RESPONSIVE ── */
/* Make topbar buttons smaller on narrow screens */
@media (max-width: 420px) {
  .tb-ttl{font-size:11px;letter-spacing:1px;}
  .tb{height:30px;padding:0 8px;font-size:9px;}
  #compass{top:58px;right:8px;}
  #compass svg{width:42px;height:42px;}
  #zoom{right:8px;bottom:80px;}
  .zb{width:40px;height:40px;font-size:20px;}
  #legend{font-size:10px;padding:6px 10px;}
  #mode-badge{font-size:8px;padding:5px 10px;bottom:12px;right:8px;}
}

/* Ensure vp sits below all fixed UI */
#vp{z-index:1;}
#stage{z-index:1;}
</style>
</head>
<body>

<!-- VIEWPORT -->
<div id="vp">
  <div id="stage">
    <svg id="svg" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="fx-rough"><feTurbulence type="turbulence" baseFrequency="0.018" numOctaves="3" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/></filter>
        <filter id="fx-glow"><feGaussianBlur stdDeviation="4" result="b"/><feFlood flood-color="#d4a830" flood-opacity=".35" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <radialGradient id="g-ocean" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#1a3550"/><stop offset="70%" stop-color="#0e2035"/><stop offset="100%" stop-color="#060d18"/></radialGradient>
        <radialGradient id="g-land" cx="52%" cy="48%" r="52%"><stop offset="0%" stop-color="#e2cc8e"/><stop offset="65%" stop-color="#cdb070"/><stop offset="100%" stop-color="#a88a48"/></radialGradient>
        <radialGradient id="g-vig" cx="50%" cy="50%" r="50%"><stop offset="58%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(4,2,1,.93)"/></radialGradient>
        <pattern id="p-waves" x="0" y="0" width="50" height="22" patternUnits="userSpaceOnUse"><path d="M0,11 Q12,5 25,11 Q38,17 50,11" fill="none" stroke="#2a5a8a" stroke-width=".9" opacity=".28"/><path d="M0,18 Q12,12 25,18 Q38,24 50,18" fill="none" stroke="#2a5a8a" stroke-width=".6" opacity=".18"/></pattern>
        <clipPath id="clip-map"><circle cx="450" cy="450" r="418"/></clipPath>
      </defs>

      <!-- Ocean -->
      <circle cx="450" cy="450" r="450" fill="#060d18"/>
      <circle cx="450" cy="450" r="418" fill="url(#g-ocean)"/>
      <circle cx="450" cy="450" r="418" fill="url(#p-waves)"/>

      <g clip-path="url(#clip-map)">
        <!-- Land -->
        <ellipse cx="450" cy="450" rx="355" ry="348" fill="url(#g-land)" filter="url(#fx-rough)"/>

        <!-- REGIONS -->
        <g id="L-regions"></g>
        <!-- REGION LABELS -->
        <g id="L-labels" pointer-events="none"></g>
        <!-- STATIC DECORATIONS -->
        <g id="L-deco" pointer-events="none">
          <!-- Ocean labels (static) -->
          <text x="95" y="445" font-family="IM Fell English,serif" font-size="13" font-style="italic" fill="#3a6a9a" text-anchor="middle" opacity=".35" transform="rotate(-10,95,445)">Mare</text>
          <text x="95" y="460" font-family="IM Fell English,serif" font-size="13" font-style="italic" fill="#3a6a9a" text-anchor="middle" opacity=".35" transform="rotate(-10,95,460)">Occidentale</text>
          <text x="808" y="430" font-family="IM Fell English,serif" font-size="12" font-style="italic" fill="#3a6a9a" text-anchor="middle" opacity=".32" transform="rotate(8,808,430)">Mare</text>
          <text x="808" y="444" font-family="IM Fell English,serif" font-size="12" font-style="italic" fill="#3a6a9a" text-anchor="middle" opacity=".32" transform="rotate(8,808,444)">Orientale</text>
        </g>
        <!-- TOWER (rendered by JS, draggable in edit mode) -->
        <g id="L-tower"></g>
        <!-- CITIES -->
        <g id="L-cities"></g>
        <!-- VERTEX HANDLES (top, edit mode only) -->
        <g id="L-handles"></g>
        <!-- Vignette -->
        <circle cx="450" cy="450" r="418" fill="url(#g-vig)" pointer-events="none"/>
      </g>
    </svg>
  </div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <span class="tb-ttl">ERADRIEL</span>
  <div class="sep"></div>
  <button class="tb on" id="btn-view">👁 Vista</button>
  <button class="tb"    id="btn-edit">🗺 Regioni</button>
  <button class="tb"    id="btn-city">📍 +Città</button>
  <button class="tb"    id="btn-newreg">➕ +Regione</button>
  <div class="sep"></div>
  <button class="tb"    id="btn-save">💾 Salva</button>
  <button class="tb red" id="btn-reset">↺ Reset</button>
  <div class="sep"></div>
  <button class="tb" id="btn-export">📤 Esporta</button>
</div>

<!-- ZOOM -->
<div id="zoom">
  <button class="zb" id="z+">+</button>
  <button class="zb" id="z-">−</button>
  <button class="zb" id="z0" style="font-size:17px">⌂</button>
</div>

<!-- COMPASS -->
<div id="compass">
  <svg width="52" height="52" viewBox="0 0 80 80">
    <circle cx="40" cy="40" r="36" fill="rgba(6,3,1,.9)" stroke="#8B6914" stroke-width="1.5"/>
    <polygon points="40,8 45,38 40,32 35,38" fill="#b02818"/>
    <polygon points="40,72 45,42 40,48 35,42" fill="#a08040"/>
    <polygon points="72,40 42,35 48,40 42,45" fill="#a08040"/>
    <polygon points="8,40 38,35 32,40 38,45"  fill="#a08040"/>
    <circle cx="40" cy="40" r="4" fill="#d4a830" stroke="#8B6914" stroke-width="1"/>
    <text x="40" y="22" font-family="Cinzel,serif" font-size="11" font-weight="700" fill="#e8d5a0" text-anchor="middle">N</text>
    <text x="40" y="65" font-family="Cinzel,serif" font-size="9" fill="#a08040" text-anchor="middle">S</text>
    <text x="65" y="44" font-family="Cinzel,serif" font-size="9" fill="#a08040" text-anchor="middle">E</text>
    <text x="15" y="44" font-family="Cinzel,serif" font-size="9" fill="#a08040" text-anchor="middle">O</text>
  </svg>
</div>

<!-- LEGEND -->
<div id="legend">
  <div id="leg-header">
    <h3>Legenda</h3>
    <span id="leg-toggle">▲</span>
  </div>
  <div id="leg-body"></div>
</div>

<!-- MODE BADGE -->
<div id="mode-badge">VISTA</div>

<!-- EDITOR SHEET (region / city) -->
<div class="sheet" id="ed-sheet">
  <div class="sh-bar"></div>
  <div class="sh-head">
    <span class="sh-title" id="ed-title">Modifica</span>
    <button class="sh-x" id="ed-close">✕</button>
  </div>
  <div class="sh-body" id="ed-body"></div>
</div>

<!-- INFO SHEET (view mode tap) -->
<div class="sheet" id="info-sheet">
  <div class="sh-bar"></div>
  <div class="sh-head">
    <span></span>
    <button class="sh-x" id="info-close">✕</button>
  </div>
  <div class="sh-body">
    <div id="ip-region"></div>
    <div id="ip-name"></div>
    <div class="ip-line"></div>
    <div id="ip-pop"></div>
    <div id="ip-type"></div>
  </div>
</div>

<!-- RESET OVERLAY -->
<div id="overlay">
  <div class="ov-box">
    <h3>Reimpostare la mappa?</h3>
    <p>Tutti i cambiamenti andranno persi e la mappa tornerà ai valori di default.</p>
    <div class="row-btns">
      <button class="btn-yes" id="ov-yes">Sì, reimposta</button>
      <button class="btn-no"  id="ov-no">Annulla</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

function saveS(){
  try{ localStorage.setItem(SKEY, JSON.stringify(S)); toast('Salvato ✓'); }
  catch(e){ toast('Errore salvataggio'); }
}
function loadS(){
  try{
    const d = localStorage.getItem(SKEY);
    if(d){ S=JSON.parse(d); if(!S.tower) S.tower={...DEF_TOWER}; } else { resetS(); }
  } catch(e){ resetS(); }
}
function resetS(){
  S = {
    regions: DEF_REGIONS.map(r=>({...r, pts:r.pts.map(p=>[p[0],p[1]])})),
    cities:  DEF_CITIES.map(c=>({...c})),
    tower:   {...DEF_TOWER}
  };
}

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function svgNS(tag,attrs){
  const el=document.createElementNS(NS,tag);
  for(const [k,v] of Object.entries(attrs||{})) el.setAttribute(k,v);
  return el;
}
function ptsStr(pts){ return pts.map(p=>p[0]+','+p[1]).join(' '); }
function centroid(pts){
  const n=pts.length;
  return [pts.reduce((s,p)=>s+p[0],0)/n, pts.reduce((s,p)=>s+p[1],0)/n];
}
function darken(hex){
  try{
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.floor(r*.5)},${Math.floor(g*.5)},${Math.floor(b*.5)})`;
  }catch(e){return '#333';}
}

let _toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove('show'),2000);
}

function renderRegions(){

  rl.innerHTML=''; ll.innerHTML='';

  S.regions.forEach(r=>{
    const poly = svgNS('polygon',{
      points: ptsStr(r.pts),
      fill: r.color, stroke: r.stroke,
      'stroke-width':'1.5', opacity: r.op,
      'data-rid': r.id,
    });
    // In edit mode, clicking the polygon selects it — no accidental vertex add
    if(mode==='edit') poly.style.cursor='pointer';
    rl.appendChild(poly);

    // Labels
    const [cx,cy] = centroid(r.pts);
    const t1=svgNS('text',{x:cx,y:cy-5,'font-family':'Cinzel,serif','font-size':'14',

  });

function cityShape(cfg, x, y, g){
  const r=cfg.r, s=r+3;
  if(cfg.tri){
    // Triangle (missione, avamposto)
    g.appendChild(svgNS('polygon',{points:`${x},${y-s} ${x+s},${y+s} ${x-s},${y+s}`,fill:cfg.fill,stroke:darken(cfg.fill),'stroke-width':'1.5'}));
    if(cfg.inner) g.appendChild(svgNS('circle',{cx:x,cy:y+Math.round(s/3),r:'3',fill:cfg.inner,opacity:'.9'}));
  } else if(cfg.sq){
    // Square (fortezza, segreto)
    const h=r+1;
    g.appendChild(svgNS('rect',{x:x-h,y:y-h,width:h*2,height:h*2,rx:'1',fill:cfg.fill,stroke:darken(cfg.fill),'stroke-width':'1.5'}));
    if(cfg.inner) g.appendChild(svgNS('rect',{x:x-r+2,y:y-r+2,width:(r-2)*2,height:(r-2)*2,rx:'1',fill:cfg.inner,opacity:'.8'}));
  } else if(cfg.star){
    // Star (rovine) — 6-pointed using two triangles
    const pts1=`${x},${y-s} ${x+s*.87},${y+s*.5} ${x-s*.87},${y+s*.5}`;
    const pts2=`${x},${y+s} ${x+s*.87},${y-s*.5} ${x-s*.87},${y-s*.5}`;
    g.appendChild(svgNS('polygon',{points:pts1,fill:cfg.fill,stroke:darken(cfg.fill),'stroke-width':'1',opacity:'.9'}));
    g.appendChild(svgNS('polygon',{points:pts2,fill:cfg.fill,stroke:darken(cfg.fill),'stroke-width':'1',opacity:'.7'}));
    if(cfg.inner) g.appendChild(svgNS('circle',{cx:x,cy:y,r:'3',fill:cfg.inner}));
  } else if(cfg.cross){
    // Cross (tempio)
    const t=Math.max(2,Math.floor(r/3));
    g.appendChild(svgNS('rect',{x:x-t,y:y-r,width:t*2,height:r*2,rx:'1',fill:cfg.fill,stroke:darken(cfg.fill),'stroke-width':'1'}));
    g.appendChild(svgNS('rect',{x:x-r,y:y-t,width:r*2,height:t*2,rx:'1',fill:cfg.fill,stroke:darken(cfg.fill),'stroke-width':'1'}));
    if(cfg.inner) g.appendChild(svgNS('circle',{cx:x,cy:y,r:'2',fill:cfg.inner}));
  } else {
    // Circle (default)
    g.appendChild(svgNS('circle',{cx:x,cy:y,r:r,fill:cfg.fill,stroke:darken(cfg.fill),'stroke-width':r>=7?'2':'1.2'}));
    if(cfg.inner) g.appendChild(svgNS('circle',{cx:x,cy:y,r:Math.max(2,r-4),fill:cfg.inner}));
  }
}

function renderCities(){
  const cl = document.getElementById('L-cities');

  S.cities.forEach(city=>{
    const cfg = CITY_CFG[city.type] || CITY_CFG.borgo;
    const g = svgNS('g',{'data-cid':city.id});
    cityShape(cfg, city.x, city.y, g);
    // Large transparent hit area
    const hit=svgNS('circle',{cx:city.x,cy:city.y,r:'20',fill:'transparent',style:'cursor:pointer'});

function renderHandles(){
  const hl = document.getElementById('L-handles');
  hl.innerHTML='';
  if(mode!=='edit' || !selRegion) return;

  const r = S.regions.find(r=>r.id===selRegion);
  if(!r) return;

  r.pts.forEach(([px,py],i)=>{
    hl.appendChild(svgNS('circle',{cx:px,cy:py,r:'24',class:'vhr'}));
    const h=svgNS('circle',{cx:px,cy:py,r:'16',class:'vh','data-rid':r.id,'data-vi':i});
    h.style.touchAction='none';
    // Attach pointer listeners directly on each handle
    h.addEventListener('pointerdown', evH=>{
      evH.preventDefault(); evH.stopPropagation();
      h.setPointerCapture(evH.pointerId);
      h.classList.add('drag');
      AP.set(evH.pointerId,{cx:evH.clientX,cy:evH.clientY,role:'handle',rid:r.id,vi:i,el:h});
    },{passive:false});
    h.addEventListener('pointermove', evH=>{
      evH.stopPropagation();
      const ptr=AP.get(evH.pointerId);
      if(!ptr || ptr.role!=='handle') return;
      ptr.cx=evH.clientX; ptr.cy=evH.clientY;
      const rr=S.regions.find(rr=>rr.id===ptr.rid);
      if(rr){
        const [sx,sy]=c2s(evH.clientX,evH.clientY);
        rr.pts[ptr.vi]=[Math.round(sx),Math.round(sy)];
        renderRegions(); renderHandles();
      }
    },{passive:true});
    h.addEventListener('pointerup', evH=>{
      evH.stopPropagation();
      const ptr=AP.get(evH.pointerId);
      AP.delete(evH.pointerId);
      if(ptr && ptr.el) ptr.el.classList.remove('drag');
      renderHandles(); saveS();
    },{passive:true});
    h.addEventListener('pointercancel', evH=>{
      AP.delete(evH.pointerId);
      h.classList.remove('drag');
      renderHandles();
    },{passive:true});
    hl.appendChild(h);
  });
}

/* ═══════════════════════════════════════════════
   PAN / ZOOM  — clean, SVG-matrix approach
   We store tx,ty,sc. svgToClient and clientToSvg
   are the only coordinate conversion functions.
═══════════════════════════════════════════════ */
const vp    = document.getElementById('vp');
const stage = document.getElementById('stage');
let tx=0, ty=0, sc=1;
const MINSC=0.22, MAXSC=7;

function applyTransform(animate){
  const vw=window.innerWidth, vh=window.innerHeight;
  const mw=SW*sc, mh=SH*sc;
  tx=clamp(tx, Math.min(0,vw-mw), Math.max(0,(vw-mw)/2));
  ty=clamp(ty, Math.min(0,vh-mh), Math.max(0,(vh-mh)/2));
  stage.style.transition = animate ? 'transform .22s ease' : 'none';
  stage.style.transform  = `translate(${tx}px,${ty}px) scale(${sc})`;
}

function initTransform(){
  const vw=window.innerWidth, vh=window.innerHeight;
  sc = clamp(Math.min(vw,vh)/SW*0.97, MINSC, MAXSC);
  tx=(vw-SW*sc)/2; ty=(vh-SH*sc)/2; applyTransform(false);
}

// Client pixel → SVG coordinate
function c2s(cx,cy){ return [(cx-tx)/sc, (cy-ty)/sc]; }

function zoomAt(cx,cy,ns){
  ns=clamp(ns,MINSC,MAXSC);
  tx=cx-(cx-tx)*(ns/sc);
  ty=cy-(cy-ty)*(ns/sc);
  sc=ns; applyTransform(true);
}

document.getElementById('z+').addEventListener('click', ()=>zoomAt(window.innerWidth/2,window.innerHeight/2,sc*1.5));
document.getElementById('z-').addEventListener('click', ()=>zoomAt(window.innerWidth/2,window.innerHeight/2,sc/1.5));
document.getElementById('z0').addEventListener('click', ()=>initTransform());
vp.addEventListener('wheel',e=>{e.preventDefault();zoomAt(e.clientX,e.clientY,sc*(e.deltaY<0?1.15:1/1.15));},{passive:false});

/* ═══════════════════════════════════════════════
   POINTER INPUT — single source of truth
   
   We use ONE pointerdown/move/up on the entire vp.
   We track up to 2 active pointers.
   Each pointer has a "role": 'pan' | 'handle' | 'city'
   
   Key principle: coordinate conversion c2s() is called
   ONLY at the moment of the event, never stored in SVG units.
═══════════════════════════════════════════════ */

// Active pointers: id → {cx, cy, role, data}
const AP = new Map();

// Pan state
let panBase = null; // {tx,ty} at pan start (updated per pointer)

// Pinch state
let pinch = null; // {d, mx, my} distance & midpoint at last frame

// Tap detection
let tapStart = null; // {cx,cy,t}
const TAP_MAX_MOVE = 10;
const TAP_MAX_MS   = 300;

function getActivePanPtrs(){
  return [...AP.values()].filter(p=>p.role==='pan');
}

vp.addEventListener('pointerdown', e=>{
  e.preventDefault();
  const cx=e.clientX, cy=e.clientY;

  // Hit-test BEFORE setPointerCapture — after capture, elementFromPoint returns vp itself
  if(mode==='edit'){
    const el = document.elementFromPoint(cx,cy);

    // Vertex handle?
    const h = el && (el.classList.contains('vh') ? el : el.closest('.vh'));
    if(h){
      h.setPointerCapture(e.pointerId);          // capture on the handle, not vp
      const rid = h.getAttribute('data-rid');
      const vi  = parseInt(h.getAttribute('data-vi'));
      h.classList.add('drag');
      AP.set(e.pointerId,{cx,cy,role:'handle',rid,vi,el:h});
      return;
    }

    // City marker?
    const g = el && el.closest('[data-cid]');
    if(g){
      vp.setPointerCapture(e.pointerId);
      const cid=g.getAttribute('data-cid');
      const city=S.cities.find(c=>c.id===cid);
      if(city){
        AP.set(e.pointerId,{cx,cy,role:'city',cid,ox:city.x,oy:city.y,sx:cx,sy:cy});
        return;
      }
    }

    // Tower drag?
    if(el && (el.getAttribute('data-tower') || el.closest('[data-tower]'))){
      vp.setPointerCapture(e.pointerId);
      AP.set(e.pointerId,{cx,cy,role:'tower',ox:S.tower.x,oy:S.tower.y,sx:cx,sy:cy});
      return;
    }
  }

  // Pan / tap
  vp.setPointerCapture(e.pointerId);
  AP.set(e.pointerId,{cx,cy,role:'pan'});
  tapStart={cx,cy,t:Date.now()};
  panBase=null; pinch=null;

  const pans=getActivePanPtrs();
  if(pans.length===1){
    panBase={tx,ty,sx:cx,sy:cy};
    vp.classList.add('panning');
  } else if(pans.length===2){
    const [a,b]=[pans[0],pans[1]];
    const dx=b.cx-a.cx, dy=b.cy-a.cy;
    pinch={d:Math.sqrt(dx*dx+dy*dy), mx:(a.cx+b.cx)/2, my:(a.cy+b.cy)/2, tx, ty};
    tapStart=null;
  }
},{passive:false});

vp.addEventListener('pointermove', e=>{
  const ptr=AP.get(e.pointerId);
  if(!ptr) return;

  const cx=e.clientX, cy=e.clientY;

  // Handle drag is managed by per-handle listeners (not vp)
  if(ptr.role==='handle') return;

  // --- City drag ---
  if(ptr.role==='city'){
    const city=S.cities.find(c=>c.id===ptr.cid);
    if(city){
      city.x=Math.round(ptr.ox+(cx-ptr.sx)/sc);
      city.y=Math.round(ptr.oy+(cy-ptr.sy)/sc);
      renderCities();
    }
    return;
  }

  // --- Tower drag ---
  if(ptr.role==='tower'){
    S.tower.x=Math.round(ptr.ox+(cx-ptr.sx)/sc);
    S.tower.y=Math.round(ptr.oy+(cy-ptr.sy)/sc);
    renderTower();
    return;
  }

  // --- Pan ---
  if(ptr.role!=='pan') return;
  ptr.cx=cx; ptr.cy=cy;

  // Invalidate tap if moved too much
  if(tapStart){
    const dx=cx-tapStart.cx, dy=cy-tapStart.cy;
    if(Math.sqrt(dx*dx+dy*dy)>TAP_MAX_MOVE) tapStart=null;
  }

  const pans=getActivePanPtrs();

  if(pans.length===1 && panBase){
    const dx=cx-panBase.sx, dy=cy-panBase.sy;
    tx=panBase.tx+dx; ty=panBase.ty+dy; applyTransform(false);

  } else if(pans.length>=2 && pinch){
    const [a,b]=[pans[0],pans[1]];
    const dx=b.cx-a.cx, dy=b.cy-a.cy;
    const nd=Math.sqrt(dx*dx+dy*dy);
    const nmx=(a.cx+b.cx)/2, nmy=(a.cy+b.cy)/2;

    if(nd>0 && pinch.d>0){
      const ns=clamp(sc*(nd/pinch.d),MINSC,MAXSC);
      // Scale around current midpoint, then pan by midpoint delta
      tx = nmx + (pinch.tx - pinch.mx) * (ns/sc) + (nmx - pinch.mx);
      ty = nmy + (pinch.ty - pinch.my) * (ns/sc) + (nmy - pinch.my);
      sc = ns;
    }
    pinch={d:nd,mx:nmx,my:nmy,tx,ty};
    applyTransform(false);
  }
},{passive:true});

vp.addEventListener('pointerup', e=>{
  const ptr=AP.get(e.pointerId);
  AP.delete(e.pointerId);
  if(!ptr) return;

  if(ptr.role==='handle') return; // managed by per-handle listeners

  if(ptr.role==='city'){ saveS(); return; }
  if(ptr.role==='tower'){ saveS(); return; }

  if(ptr.role==='pan'){
    vp.classList.remove('panning');
    // Tap?
    if(tapStart){
      const dt=Date.now()-tapStart.t;
      const dx=e.clientX-tapStart.cx, dy=e.clientY-tapStart.cy;
      if(dt<TAP_MAX_MS && Math.sqrt(dx*dx+dy*dy)<TAP_MAX_MOVE){
        handleTap(e.clientX,e.clientY);
      }
      tapStart=null;
    }
    // Reinit pan if one finger remains
    const pans=getActivePanPtrs();
    if(pans.length===1){
      panBase={tx,ty,sx:pans[0].cx,sy:pans[0].cy};
      pinch=null;
    } else {
      panBase=null; pinch=null;
    }
  }
},{passive:true});

vp.addEventListener('pointercancel', e=>{
  const ptr=AP.get(e.pointerId);
  AP.delete(e.pointerId);
  if(ptr){
    if(ptr.role==='handle'){ ptr.el && ptr.el.classList.remove('drag'); renderHandles(); }
    if(ptr.role==='city'){ saveS(); }
  }
  if(AP.size===0){ vp.classList.remove('panning'); panBase=null; pinch=null; }
},{passive:true});

/* ═══════════════════════════════════════════════
   TAP HANDLER
═══════════════════════════════════════════════ */
function handleTap(cx,cy){
  const el=document.elementFromPoint(cx,cy);

  if(mode==='addcity'){
    const [sx,sy]=c2s(cx,cy);
    openNewCity(sx,sy);
    return;
  }

  if(mode==='edit'){
    // Tap on polygon → select region (NOT add vertex)
    const poly=el && el.closest('[data-rid]');
    if(poly && !poly.classList.contains('vh')){
      selectRegion(poly.getAttribute('data-rid')); return;
    }
    // Tap on city → edit city
    const cg=el && el.closest('[data-cid]');
    if(cg){ openEditCity(cg.getAttribute('data-cid')); return; }
    // Tap empty → deselect
    selRegion=null; renderHandles(); closeEd();
    return;
  }

  // VIEW mode: tap city → edit panel
  const cg=el && el.closest('[data-cid]');
  if(cg){ openEditCity(cg.getAttribute('data-cid')); return; }
  closeEd(); closeInfo();
}

/* ═══════════════════════════════════════════════
   MODE
═══════════════════════════════════════════════ */
const badge=document.getElementById('mode-badge');
function setMode(m){
  mode=m;
  selRegion=null;
  renderHandles(); renderRegions(); renderTower();
  closeEd(); closeInfo();
  AP.clear(); pinch=null; panBase=null;

  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  vp.classList.remove('crosshair','panning');
  if(m==='view')    { document.getElementById('btn-view').classList.add('on'); badge.textContent='VISTA'; }
  if(m==='edit')    { document.getElementById('btn-edit').classList.add('on'); badge.textContent='MODIFICA REGIONI'; vp.classList.add('crosshair'); }
  if(m==='addcity') { document.getElementById('btn-city').classList.add('on'); badge.textContent='PIAZZA CITTÀ'; vp.classList.add('crosshair'); toast('Tocca la mappa per piazzare'); }
}

document.getElementById('btn-view').addEventListener('click', ()=>setMode('view'));
document.getElementById('btn-edit').addEventListener('click', ()=>setMode('edit'));
document.getElementById('btn-city').addEventListener('click', ()=>setMode('addcity'));
document.getElementById('btn-save').addEventListener('click', ()=>saveS());
document.getElementById('btn-reset').addEventListener('click',()=>document.getElementById('overlay').classList.add('show'));
document.getElementById('ov-yes').addEventListener('click',()=>{
  document.getElementById('overlay').classList.remove('show');
  resetS(); saveS(); renderAll(); toast('Mappa reimpostata');
});
document.getElementById('ov-no').addEventListener('click',()=>document.getElementById('overlay').classList.remove('show'));

document.getElementById('btn-newreg').addEventListener('click',()=>{

    pts:[[360,300],[460,280],[510,350],[460,430],[360,430],[310,350]]});

/* ═══════════════════════════════════════════════
   REGION SELECTION + EDIT PANEL
═══════════════════════════════════════════════ */
function selectRegion(rid){
  selRegion=rid; renderHandles();
  openEditRegion(rid);
}

function openEditRegion(rid){
  const r=S.regions.find(r=>r.id===rid);
  if(!r) return;

  document.getElementById('ed-title').textContent='Modifica Regione';
  const body=document.getElementById('ed-body');
  body.innerHTML='';

  const mk=(tag,attrs={},text)=>{
    const el=document.createElement(tag);
    for(const[k,v] of Object.entries(attrs)) el[k]=v;
    if(text!=null) el.textContent=text;
    return el;
  };
  const field=(lbl,child)=>{
    const d=mk('div',{className:'fl'});
    d.appendChild(mk('label',{},lbl));
    d.appendChild(child); return d;
  };

  const iName=mk('input',{className:'fi',value:r.name,placeholder:'Nome'});
  const iSub =mk('input',{className:'fi',value:r.sub,placeholder:'es. Impero Teocratico'});
  body.appendChild(field('Nome Regione',iName));
  body.appendChild(field('Sottotitolo',iSub));

  const g2=mk('div',{className:'g2'}); body.appendChild(g2);
  const iColor =mk('input',{type:'color',className:'fc',value:r.color});
  const iStroke=mk('input',{type:'color',className:'fc',value:r.stroke});
  g2.appendChild(field('Colore Fill',iColor));
  g2.appendChild(field('Colore Bordo',iStroke));

  const opVal=mk('span',{},Math.round(r.op*100)+'%');
  const opLbl=mk('label',{},'Opacità: '); opLbl.appendChild(opVal);
  const iOp=mk('input',{type:'range',className:'fi',min:20,max:100,value:Math.round(r.op*100),style:'padding:4px 0'});
  const opWrap=mk('div',{className:'fl'}); opWrap.appendChild(opLbl); opWrap.appendChild(iOp);
  body.appendChild(opWrap);

  const hint=mk('div',{className:'hint'},'💡 Trascina i vertici dorati per modificare la forma della regione. Tocca qui il pulsante Aggiungi Vertice per aggiungerne uno nuovo.');
  body.appendChild(hint);

  // Add/remove vertex buttons
  const vBtns=mk('div',{className:'g2',style:'margin-bottom:12px'});
  const bAddV=mk('button',{className:'btn-save',style:'background:rgba(30,40,10,.8);border-color:#6a9030;color:#b0d060'},'+ Vertice');
  const bDelV=mk('button',{className:'btn-del',style:''},'− Vertice');
  vBtns.appendChild(bAddV); vBtns.appendChild(bDelV);
  body.appendChild(vBtns);

  const rowBtns=mk('div',{className:'row-btns'});
  const bSave=mk('button',{className:'btn-save'},'Salva');
  const bDel =mk('button',{className:'btn-del'}, 'Elimina');
  rowBtns.appendChild(bSave); rowBtns.appendChild(bDel); body.appendChild(rowBtns);

  const cbox=mk('div',{className:'confirm-box'});
  cbox.appendChild(mk('p',{},'Eliminare questa regione?'));
  const cbtns=mk('div',{className:'row-btns'});
  const cYes=mk('button',{className:'btn-yes'},'Sì, elimina');
  const cNo =mk('button',{className:'btn-no'},'Annulla');
  cbtns.appendChild(cYes); cbtns.appendChild(cNo); cbox.appendChild(cbtns); body.appendChild(cbox);

  openEd();

  // Live preview
  iColor.addEventListener('input', ()=>{ r.color=iColor.value; renderRegions(); });
  iStroke.addEventListener('input',()=>{ r.stroke=iStroke.value; renderRegions(); });
  iOp.addEventListener('input',   ()=>{ r.op=iOp.value/100; opVal.textContent=iOp.value+'%'; renderRegions(); });

  bAddV.addEventListener('click',()=>{
    // Add vertex at centroid edge (midpoint of longest edge)
    let best=-1,bestLen=0;
    for(let i=0;i<r.pts.length;i++){
      const a=r.pts[i],b=r.pts[(i+1)%r.pts.length];
      const l=Math.hypot(b[0]-a[0],b[1]-a[1]);
      if(l>bestLen){bestLen=l;best=i;}
    }
    if(best>=0){
      const a=r.pts[best],b=r.pts[(best+1)%r.pts.length];
      r.pts.splice(best+1,0,[Math.round((a[0]+b[0])/2),Math.round((a[1]+b[1])/2)]);
      renderRegions(); renderHandles(); saveS(); toast('Vertice aggiunto al bordo più lungo');
    }
  });
  bDelV.addEventListener('click',()=>{
    if(r.pts.length<=3){toast('Minimo 3 vertici');return;}
    r.pts.pop(); renderRegions(); renderHandles(); saveS(); toast('Ultimo vertice rimosso');
  });

  bSave.addEventListener('click',()=>{
    r.name=iName.value.trim()||r.name;
    r.sub=iSub.value.trim();
    renderAll(); saveS(); closeEd(); toast('Regione salvata ✓');
  });
  bDel.addEventListener('click',()=>cbox.classList.add('show'));
  cYes.addEventListener('click',()=>{
    S.regions=S.regions.filter(x=>x.id!==rid);
    selRegion=null; renderAll(); saveS(); closeEd(); toast('Regione eliminata');
  });
  cNo.addEventListener('click',()=>cbox.classList.remove('show'));
}

/* ═══════════════════════════════════════════════
   CITY PANELS
═══════════════════════════════════════════════ */
function cityTypeOpts(sel){
  return Object.entries(CITY_CFG).map(([k,v])=>`<option value="${k}"${k===sel?' selected':''}>${v.lbl}</option>`).join('');
}
function regionOpts(sel){
  return REGIONS_LIST.map(n=>`<option value="${n}"${n===sel?' selected':''}>${n}</option>`).join('');
}

function openNewCity(sx,sy){
  document.getElementById('ed-title').textContent='Nuova Città';
  const body=document.getElementById('ed-body');
  body.innerHTML='';

  const mk=(tag,attrs={},inner)=>{
    const el=document.createElement(tag);
    for(const[k,v] of Object.entries(attrs)) el[k]=v;
    if(inner!=null) el.innerHTML=inner; return el;
  };

  const iName=mk('input',{className:'fi',placeholder:'Nome città'});
  const iPop =mk('input',{className:'fi',placeholder:'es. ~50.000 ab.'});
  let newSelType='media';
  const sType=mk('select',{className:'fs'},cityTypeOpts('media')); // kept for compat but hidden
  sType.style.display='none';
  const sReg =mk('select',{className:'fs'},regionOpts('Reth Maar'));

  const f=(l,c)=>{const d=document.createElement('div');d.className='fl';const lb=document.createElement('label');lb.textContent=l;d.appendChild(lb);d.appendChild(c);return d;};
  body.appendChild(f('Nome',iName));
  const g2=document.createElement('div'); g2.className='g2';
  g2.appendChild(f('Popolazione',iPop));
  g2.appendChild(f('Tipo',sType));
  body.appendChild(g2);
  body.appendChild(f('Regione',sReg));
  body.appendChild(mk('div',{className:'hint'},`📍 Posizione: ${Math.round(sx)}, ${Math.round(sy)}`));

  const bSave=document.createElement('button');bSave.className='btn-save';bSave.textContent='Piazza Città';
  body.appendChild(bSave);
  openEd();

  bSave.addEventListener('click',()=>{
    const name=iName.value.trim();
    if(!name){toast('Inserisci un nome');return;}
    S.cities.push({id:'city_'+Date.now(),name,pop:iPop.value||'Sconosciuta',region:sReg.value,type:sType.value,x:Math.round(sx),y:Math.round(sy)});
    renderCities(); saveS(); closeEd(); setMode('view'); toast('Città aggiunta ✓');
  });
}

function openEditCity(cid){
  const city=S.cities.find(c=>c.id===cid);
  if(!city) return;

  document.getElementById('ed-title').textContent='Modifica Città';
  const body=document.getElementById('ed-body');
  body.innerHTML='';

  const mk=(tag,cls,inner)=>{const el=document.createElement(tag);if(cls)el.className=cls;if(inner!=null)el.innerHTML=inner;return el;};
  const fl=(lbl,ch)=>{const d=mk('div','fl');const l=mk('label');l.textContent=lbl;d.appendChild(l);d.appendChild(ch);return d;};

  // Icon preview
  const previewWrap=mk('div','fl');
  const previewLbl=mk('label'); previewLbl.textContent='Icona'; previewWrap.appendChild(previewLbl);
  const previewSvg=document.createElementNS(NS,'svg');
  previewSvg.setAttribute('viewBox','-30 -30 60 60');
  previewSvg.style.cssText='width:60px;height:60px;display:block;margin:4px 0 0;background:rgba(14,9,2,.6);border-radius:8px;border:1px solid var(--border)';
  const previewG=document.createElementNS(NS,'g');
  previewSvg.appendChild(previewG); previewWrap.appendChild(previewSvg);
  body.appendChild(previewWrap);

  function refreshPreview(type){
    previewG.innerHTML='';
    const cfg=CITY_CFG[type]||CITY_CFG.borgo;
    cityShape(cfg,0,0,previewG);
  }

  // Type selector as visual grid
  const typeWrap=mk('div','fl');
  const typeLbl=mk('label'); typeLbl.textContent='Tipo'; typeWrap.appendChild(typeLbl);
  const typeGrid=mk('div'); typeGrid.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:6px;';
  typeWrap.appendChild(typeGrid); body.appendChild(typeWrap);

  let selType=city.type;
  Object.entries(CITY_CFG).forEach(([key,cfg])=>{
    const btn=mk('button');
    btn.dataset.type=key;
    btn.style.cssText='background:rgba(16,10,2,.8);border:2px solid var(--border);border-radius:8px;padding:8px 4px;cursor:pointer;text-align:center;transition:border-color .15s;';
    // Mini SVG icon
    const bSvg=document.createElementNS(NS,'svg');
    bSvg.setAttribute('viewBox','-14 -14 28 28');
    bSvg.style.cssText='width:28px;height:28px;display:block;margin:0 auto 4px';
    const bG=document.createElementNS(NS,'g');
    cityShape(cfg,-0,-0,bG); bSvg.appendChild(bG); btn.appendChild(bSvg);
    const lbl=mk('div'); lbl.style.cssText='font-family:Cinzel,serif;font-size:8px;color:var(--text-dim);letter-spacing:.3px;line-height:1.2;';
    lbl.textContent=cfg.lbl; btn.appendChild(lbl);
    if(key===selType) btn.style.borderColor='var(--gold)';
    btn.addEventListener('click',()=>{
      selType=key;
      typeGrid.querySelectorAll('button').forEach(b=>b.style.borderColor='var(--border)');
      btn.style.borderColor='var(--gold)';
      refreshPreview(key);
    });
    typeGrid.appendChild(btn);
  });

  refreshPreview(selType);

  const iName=mk('input','fi'); iName.value=city.name; iName.placeholder='Nome';
  const iPop =mk('input','fi'); iPop.value=city.pop||'';  iPop.placeholder='es. ~50.000 ab.';
  const sReg =mk('select','fs'); sReg.innerHTML=regionOpts(city.region);

  body.appendChild(fl('Nome',iName));
  body.appendChild(fl('Popolazione',iPop));
  body.appendChild(fl('Regione',sReg));

  const hint=mk('div','hint'); hint.textContent='✋ In modalità Regioni puoi trascinare il marker sulla mappa.';
  body.appendChild(hint);

  const rowBtns=mk('div','row-btns');
  const bSave=mk('button','btn-save'); bSave.textContent='Salva';
  const bDel =mk('button','btn-del');  bDel.textContent='Elimina';
  rowBtns.appendChild(bSave); rowBtns.appendChild(bDel); body.appendChild(rowBtns);

  const cbox=mk('div','confirm-box');
  cbox.innerHTML='<p>Eliminare questa città?</p>';
  const cbtns=mk('div','row-btns');
  const cYes=mk('button','btn-yes'); cYes.textContent='Sì, elimina';
  const cNo =mk('button','btn-no');  cNo.textContent='Annulla';
  cbtns.appendChild(cYes); cbtns.appendChild(cNo); cbox.appendChild(cbtns); body.appendChild(cbox);

  openEd();

  bSave.addEventListener('click',()=>{
    city.name=iName.value.trim()||city.name;
    city.pop=iPop.value||city.pop;
    city.type=selType;
    city.region=sReg.value;
    renderCities(); saveS(); closeEd(); toast('Città salvata ✓');
  });
  bDel.addEventListener('click',()=>cbox.classList.add('show'));
  cYes.addEventListener('click',()=>{
    S.cities=S.cities.filter(x=>x.id!==cid);
    renderCities(); saveS(); closeEd(); toast('Città eliminata');
  });
  cNo.addEventListener('click',()=>cbox.classList.remove('show'));
}

/* ═══════════════════════════════════════════════
   PANELS OPEN/CLOSE
═══════════════════════════════════════════════ */
function setUIVisibility(visible){
  const els=['zoom','compass','mode-badge','legend'];
  els.forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.opacity = visible ? '' : '0';
    if(el) el.style.pointerEvents = visible ? '' : 'none';
  });
}
function openEd(){
  document.getElementById('ed-sheet').classList.add('open');
  setUIVisibility(false);
}
function closeEd(){
  document.getElementById('ed-sheet').classList.remove('open');
  setUIVisibility(true);
}
function openInfo(){
  document.getElementById('info-sheet').classList.add('open');
  setUIVisibility(false);
}
function closeInfo(){
  document.getElementById('info-sheet').classList.remove('open');
  setUIVisibility(true);
}

document.getElementById('ed-close').addEventListener('click',   closeEd);
document.getElementById('info-close').addEventListener('click', closeInfo);

// Swipe-down to close
function swipeClose(panelId){
  const el=document.getElementById(panelId);
  let sy=0;
  el.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});
  el.addEventListener('touchend',  e=>{if(e.changedTouches[0].clientY-sy>70) el.classList.remove('open');},{passive:true});
}
swipeClose('ed-sheet'); swipeClose('info-sheet');

function showInfo(cid){
  const c=S.cities.find(c=>c.id===cid);
  if(!c) return;
  const cfg=CITY_CFG[c.type]||CITY_CFG.borgo;
  document.getElementById('ip-region').textContent=c.region;
  document.getElementById('ip-name').textContent=c.name;
  document.getElementById('ip-pop').textContent=c.pop;
  document.getElementById('ip-type').textContent=cfg.lbl;
  openInfo();
}

function exportMap(){
  const json   = JSON.stringify(S, null, 2);
  const b64    = btoa(unescape(encodeURIComponent(json)));
  const a      = document.createElement('a');
  a.href       = 'data:application/json;base64,' + b64;
  a.download   = 'mappa.json';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast('Mappa esportata ✓');
}
document.getElementById('btn-export').addEventListener('click', exportMap);
