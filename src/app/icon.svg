<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="8" fill="#1a1207"/>
  <!-- Decorative border -->
  <rect x="3" y="3" width="58" height="58" rx="6" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <rect x="6" y="6" width="52" height="52" rx="4" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
  <!-- Stylized medieval E -->
  <g transform="translate(32,32)">
    <!-- Main vertical stroke with serifs -->
    <path d="M-12,-20 L-12,20 L-8,20 L-8,2 L-12,2 L-12,-2 L-8,-2 L-8,-20 Z" fill="#c9a84c"/>
    <!-- Top horizontal bar with decorative terminal -->
    <path d="M-12,-20 L14,-20 L14,-15 L12,-14 L-8,-14 L-8,-16 L-12,-16 Z" fill="#c9a84c"/>
    <!-- Top serif curl -->
    <path d="M14,-20 Q18,-20 17,-15 L14,-15 Z" fill="#c9a84c"/>
    <!-- Middle horizontal bar -->
    <path d="M-8,-3 L8,-3 L10,-1 L8,3 L-8,3 Z" fill="#c9a84c"/>
    <!-- Middle bar decorative point -->
    <path d="M8,-3 L12,0 L8,3 Z" fill="#c9a84c"/>
    <!-- Bottom horizontal bar with decorative terminal -->
    <path d="M-12,14 L-8,16 L12,14 L14,15 L14,20 L-12,20 Z" fill="#c9a84c"/>
    <!-- Bottom serif curl -->
    <path d="M14,20 Q18,20 17,15 L14,15 Z" fill="#c9a84c"/>
    <!-- Top-left decorative serif -->
    <path d="M-16,-20 Q-12,-22 -12,-20 L-12,-18 Q-14,-18 -16,-20 Z" fill="#c9a84c" opacity="0.8"/>
    <!-- Bottom-left decorative serif -->
    <path d="M-16,20 Q-12,22 -12,20 L-12,18 Q-14,18 -16,20 Z" fill="#c9a84c" opacity="0.8"/>
  </g>
  <!-- Corner ornaments -->
  <circle cx="10" cy="10" r="1.5" fill="#c9a84c" opacity="0.6"/>
  <circle cx="54" cy="10" r="1.5" fill="#c9a84c" opacity="0.6"/>
  <circle cx="10" cy="54" r="1.5" fill="#c9a84c" opacity="0.6"/>
  <circle cx="54" cy="54" r="1.5" fill="#c9a84c" opacity="0.6"/>
</svg>
